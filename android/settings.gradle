pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def file = new File(settingsDir, '../local.properties')
        if (file.exists()) {
            properties.load(file.newDataInputStream())
        }
        def sdkPath = properties.getProperty('flutter.sdk')
        if (sdkPath == null) {
            sdkPath = System.getenv('FLUTTER_ROOT')
        }
        if (sdkPath == null) {
            throw new GradleException("Flutter SDK not found. Define 'flutter.sdk' in local.properties or set FLUTTER_ROOT env variable.")
        }
        return sdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "9.0.1" apply false
    id "org.jetbrains.kotlin.android" version "2.3.20" apply false
}

include ":app"
